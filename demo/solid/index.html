<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>responsive Table — Solid.js</title>

    <link rel="stylesheet" type="text/css" href="../css/responsive-table.css" media="all">
    <link rel="stylesheet" type="text/css" href="../css/main.css" media="all">
</head>
<body>

<div id="app"></div>

<script type="importmap">
{
    "imports": {
        "solid-js": "https://cdn.jsdelivr.net/npm/solid-js@1/dist/solid.js",
        "solid-js/web": "https://cdn.jsdelivr.net/npm/solid-js@1/web/dist/web.js"
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/babel-preset-solid@1/dist/babel-preset-solid.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-type="module" data-presets="solid">
    import { render } from "solid-js/web";
    import { For } from "solid-js";

    function ResponsiveTable(props) {
        const className = () => props.className || "content-table";

        return (
            <table class={className()}>
                <thead>
                    <tr>
                        <For each={props.headers}>
                            {(header) => <th>{header}</th>}
                        </For>
                    </tr>
                </thead>
                <tbody>
                    <For each={props.rows}>
                        {(row) => (
                            <tr>
                                <For each={row}>
                                    {(cell, colIndex) => (
                                        <td>
                                            <span class="mobile-th">{props.headers[colIndex()]}</span>
                                            {cell}
                                        </td>
                                    )}
                                </For>
                            </tr>
                        )}
                    </For>
                </tbody>
            </table>
        );
    }

    const headers = ["table head 1", "head 2", "head 3", "head 4", "head 5"];

    const rows = [
        ["content 1 1", "content 1 2", "content 1 3", "content 1 4", "content 1 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 3 1", "content 3 2", "content 3 3", "content 3 4", "content 3 5"],
        ["content 4 1", "content 4 2", "content 4 3", "content 4 4", "content 4 5"],
    ];

    render(() => <ResponsiveTable headers={headers} rows={rows} />, document.getElementById("app"));
</script>
</body>
</html>
