<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>responsive Table — Preact</title>

    <link rel="stylesheet" type="text/css" href="../css/responsive-table.css" media="all">
    <link rel="stylesheet" type="text/css" href="../css/main.css" media="all">
</head>
<body>

<div id="app"></div>

<script type="importmap">
{
    "imports": {
        "preact": "https://esm.sh/preact@10",
        "preact/hooks": "https://esm.sh/preact@10/hooks",
        "htm/preact": "https://esm.sh/htm@3/preact"
    }
}
</script>
<script type="module">
    import { html, render } from "htm/preact";

    function ResponsiveTable({ headers, rows, className }) {
        const tableClass = className || "content-table";

        return html`
            <table class=${tableClass}>
                <thead>
                    <tr>
                        ${headers.map((header) => html`<th>${header}</th>`)}
                    </tr>
                </thead>
                <tbody>
                    ${rows.map((row) => html`
                        <tr>
                            ${row.map((cell, colIndex) => html`
                                <td>
                                    <span class="mobile-th">${headers[colIndex]}</span>
                                    ${cell}
                                </td>
                            `)}
                        </tr>
                    `)}
                </tbody>
            </table>
        `;
    }

    const headers = ["table head 1", "head 2", "head 3", "head 4", "head 5"];

    const rows = [
        ["content 1 1", "content 1 2", "content 1 3", "content 1 4", "content 1 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 3 1", "content 3 2", "content 3 3", "content 3 4", "content 3 5"],
        ["content 4 1", "content 4 2", "content 4 3", "content 4 4", "content 4 5"],
    ];

    render(html`<${ResponsiveTable} headers=${headers} rows=${rows} />`, document.getElementById("app"));
</script>
</body>
</html>
