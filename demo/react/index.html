<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>responsive Table — React</title>

    <link rel="stylesheet" type="text/css" href="../css/responsive-table.css" media="all">
    <link rel="stylesheet" type="text/css" href="../css/main.css" media="all">
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="ResponsiveTable.jsx"></script>
<script type="text/babel">
    const headers = ["table head 1", "head 2", "head 3", "head 4", "head 5"];

    const rows = [
        ["content 1 1", "content 1 2", "content 1 3", "content 1 4", "content 1 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 2 1", "content 2 2", "content 2 3", "content 2 4", "content 2 5"],
        ["content 3 1", "content 3 2", "content 3 3", "content 3 4", "content 3 5"],
        ["content 4 1", "content 4 2", "content 4 3", "content 4 4", "content 4 5"],
    ];

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(ResponsiveTable, { headers, rows }));
</script>
</body>
</html>
